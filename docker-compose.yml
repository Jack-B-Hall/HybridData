# One container serving the API + built frontend on http://<host>:8470/.
# The demo store (hash embeddings) is baked in, so retrieval is fully offline.
# Answers use a live Ollama model when HDE_LLM_BACKEND=ollama; drop those env
# lines (or set HDE_LLM_BACKEND=mock) for a fully offline template-answer demo.
services:
  hybrid-data-example:
    build: .
    image: hybrid-data-example:latest
    container_name: hybrid-data-example
    ports:
      - "8470:8000"
    restart: unless-stopped
    environment:
      HDE_LLM_BACKEND: "ollama"
      HDE_LLM_MODEL: "gemma4:26b-a4b-it-qat"
      HDE_OLLAMA_LLM_HOST: "http://192.168.1.24:11434"
      HDE_LLM_NUM_PREDICT: "4000"
      # Telemetry (request log + feedback) lives on a named volume, NOT under
      # /app/data — that path holds the baked-in corpus store, and mounting over
      # it would hide the corpus. Kept here so it survives image rebuilds.
      HDE_TELEMETRY_DB: "/app/telemetry/telemetry.db"
      # ── Bring your own data (see docs/deployment.md) ──────────────────────
      # Build a store from real data OUTSIDE the image, mount it at a path that
      # does NOT shadow the baked demo corpus (/app/data), and point the API at
      # it. Uncomment these two lines + the volume below:
      #   HDE_ID_PATTERN: "\\b\\d{4,8}\\b"          # if your ids aren't PREFIX-digits
      #   HDE_DB_PATH: "/app/data-live/hde.db"
    volumes:
      - hde-telemetry:/app/telemetry
      # - ./data-live:/app/data-live:ro            # externally-built store (read-only)

volumes:
  hde-telemetry:
